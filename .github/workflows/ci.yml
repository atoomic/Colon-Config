name: ci

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:

  xs-lint:
    runs-on: ubuntu-latest
    name: XS portability lint
    steps:
      - uses: actions/checkout@v6
      - name: Check for non-portable Perl API calls
        run: |
          # Perl_croak/Perl_warn/Perl_die require aTHX_ on threaded perls.
          # Always use the croak()/warn()/die() macros instead — they handle
          # the threading context automatically.
          # See: https://github.com/atoomic/Colon-Config/issues/2
          if grep -Pn '\bPerl_(croak|warn|die)\s*\(' Config.xs; then
            echo "::error::Use croak()/warn()/die() macros instead of Perl_* functions for threaded perl compatibility"
            exit 1
          fi

  perl-versions:
    runs-on: ubuntu-latest
    name: List Perl versions
    outputs:
      perl-versions: ${{ steps.action.outputs.perl-versions }}
    steps:
      - id: action
        uses: perl-actions/perl-versions@v2
        with:
          since-perl: '5.10'
          with-devel: true

  linux:
    name: "Perl ${{ matrix.perl-version }}"
    needs: [perl-versions]
    runs-on: ubuntu-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    strategy:
      fail-fast: false
      matrix:
        perl-version: ${{ fromJson(needs.perl-versions.outputs.perl-versions) }}
        exclude:
          - perl-version: "5.8"

    container:
      image: perldocker/perl-tester:${{ matrix.perl-version }}

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install test dependencies
        uses: perl-actions/install-with-cpanm@v1
        with:
          sudo: false
          cpanfile: ".github/cpanfile"
          installdeps: true
      - name: Set PERL5LIB to local lib
        run: echo "PERL5LIB=$(pwd)/local/lib/perl5" >> $GITHUB_ENV
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make test
        run: make test

  macos:
    name: macOS
    runs-on: macos-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTHOR_TESTING: 1
      AUTOMATED_TESTING: 1
      RELEASE_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: perl -V
        run: perl -V
      - name: Install test dependencies
        uses: perl-actions/install-with-cpanm@v1
        with:
          sudo: false
          cpanfile: ".github/cpanfile"
          installdeps: true
      - name: Set PERL5LIB to local lib
        run: echo "PERL5LIB=$(pwd)/local/lib/perl5" >> $GITHUB_ENV
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make test
        run: make test

  windows:
    name: Windows
    runs-on: windows-latest

    env:
      PERL_USE_UNSAFE_INC: 0
      AUTOMATED_TESTING: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Perl
        run: |
          choco install strawberryperl
          echo "C:\strawberry\c\bin;C:\strawberry\perl\site\bin;C:\strawberry\perl\bin" >> $env:GITHUB_PATH
      - name: perl -V
        run: perl -V
      - name: Install test dependencies
        run: cpanm --notest --installdeps .
      - name: Makefile.PL
        run: perl Makefile.PL
      - name: make test
        run: gmake test
